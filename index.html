<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Shelf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Caveat:wght@500;600&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #e9e6df; font-family: 'Inter', sans-serif; overflow: hidden; transition: background 0.6s ease; }
  body.night { background: #14131a; }
  canvas { display: block; touch-action: none; }

  #hud { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 24px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
  #title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; color: #2b2a28; transition: color 0.6s ease; }
  body.night #title { color: #f0ede4; }
  #title span { display: block; font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; color: #8a9c7e; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  #topRight { display: flex; align-items: center; gap: 10px; pointer-events: auto; flex-wrap: wrap; justify-content: flex-end; max-width: 70vw; }
  .pill { background: rgba(255,255,255,0.75); border: 1px solid rgba(0,0,0,0.08); border-radius: 999px; padding: 8px 14px; font-size: 12px; font-weight: 500; color: #4a4842; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease; white-space: nowrap; }
  body.night .pill { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #e6e1d3; }
  #count { font-size: 12px; color: #7a766c; pointer-events: none; align-self: center; }
  body.night #count { color: #a89f8c; }
  #count b { color: #5c7a52; } body.night #count b { color: #c9a86a; }

  #listView { position: fixed; inset: 0; background: rgba(233,230,223,0.98); z-index: 70; display: none; flex-direction: column; padding: 20px 24px; }
  body.night #listView { background: rgba(20,19,26,0.98); }
  #listView.open { display: flex; }
  #listHeader { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  #searchInput { flex: 1; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.12); border-radius: 999px; padding: 10px 16px; font-size: 14px; color: #2b2a28; }
  body.night #searchInput { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: #f0ede4; }
  #closeList { background: none; border: none; font-size: 24px; color: #7a766c; cursor: pointer; padding: 0 6px; }
  #filterRow { display: flex; gap: 10px; margin-bottom: 14px; }
  #filterRow select { flex: 1; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; padding: 9px 12px; font-size: 13px; color: #2b2a28; font-family: 'Inter', sans-serif; }
  body.night #filterRow select { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: #f0ede4; }
  #listGrid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding-bottom: 20px; }
  .gridCard { cursor: pointer; display: flex; flex-direction: column; }
  .gridSpine { width: 100%; aspect-ratio: 2/3; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 8px; text-align: center; }
  .gridSpine img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
  .gridSpine span { color: #fff; font-size: 11px; font-weight: 600; line-height: 1.3; font-family: 'Fraunces', serif; }
  .gridCard p { font-size: 10.5px; color: #7a766c; margin: 5px 2px 0; line-height: 1.3; }
  body.night .gridCard p { color: #a89f8c; }
  #noResults { grid-column: 1 / -1; text-align: center; color: #9a9688; font-size: 13px; padding: 40px 0; }

  #listDetail { position: absolute; inset: 20px 24px; background: transparent; display: none; flex-direction: column; z-index: 80; }
  #listDetail.open { display: flex; }
  #closeListDetail { align-self: flex-end; background: rgba(0,0,0,0.06); border: none; color: #2b2a28; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 14px; padding: 8px 16px; border-radius: 999px; }
  body.night #closeListDetail { background: rgba(255,255,255,0.1); color: #f0ede4; }
  #listDetailBody { flex: 1; display: flex; gap: 24px; min-height: 0; position: relative; }
  #listDetailLeft { flex: 0 0 42%; display: flex; align-items: center; justify-content: center; }
  #listDetailLeft img { max-width: 100%; max-height: 100%; border-radius: 10px; box-shadow: 0 12px 32px rgba(0,0,0,0.25); object-fit: cover; }
  .listDetailSpine { width: 78%; aspect-ratio: 2/3; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
  .listDetailSpine span { color: #fff; font-family: 'Fraunces', serif; font-size: 18px; line-height: 1.4; }
  #listDetailRight { flex: 1; background: #8FBC8B; border-radius: 18px; padding: 26px 28px; overflow-y: auto; min-width: 0; }
  #listDetailTitle { font-family: 'Fraunces', serif; font-size: 21px; color: #000; margin: 0 0 4px; }
  #listDetailAuthor { font-size: 13.5px; color: #000; margin: 0 0 12px; }
  #listDetailTags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  #listDetailTags .tag { background: rgba(0,0,0,0.12); color: #000; }
  #listSynLabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: #1a1a1a; margin: 0 0 4px; }
  #listDetailDesc { font-size: 13px; line-height: 1.6; color: #000; margin: 0 0 14px; }
  #listDetailISBN { font-size: 11px; color: #1a1a1a; margin-bottom: 14px; }
  #listHeartBtn { border: 1px solid rgba(0,0,0,0.3); background: none; border-radius: 999px; padding: 9px 18px; font-size: 13px; cursor: pointer; color: #000; }
  #listHeartBtn.saved { background: #d8555c; border-color: #d8555c; color: #fff; }
  #listDetail .navBtn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 81; }
  #listDetail #prevBook { left: 0; }
  #listDetail #nextBook { right: 0; }

  #navArrows { position: fixed; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 16px; transform: translateY(-50%); z-index: 8; pointer-events: none; }
  .navBtn { pointer-events: auto; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); font-size: 22px; color: #4a4842; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s ease, transform 0.1s ease; }
  .navBtn:active { transform: scale(0.92); background: rgba(0,0,0,0.1); }
  body.night .navBtn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #e6e1d3; }
  body.night .navBtn:active { background: rgba(255,255,255,0.18); }

  #hint { position: fixed; bottom: 24px; right: 24px; color: #9a9688; font-size: 12px; z-index: 6; pointer-events: none; text-align: right; }
  body.night #hint { color: #6a6658; }

  #loadingBar { position: fixed; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(0,0,0,0.06); z-index: 40; overflow: hidden; }
  #loadingFill { height: 100%; width: 0%; background: #5c7a52; transition: width 0.25s ease; }
  #loadingLabel { position: fixed; bottom: 10px; left: 24px; font-size: 12px; color: #7a766c; z-index: 40; }
  body.night #loadingLabel { color: #a89f8c; }

  #errorBox { position: fixed; top: 76px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 14px 20px; max-width: 420px; font-size: 13px; color: #7a3b3b; z-index: 50; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

  #detail { position: fixed; left: 0; bottom: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid rgba(0,0,0,0.08); transform: translateY(110%); transition: transform 0.32s ease; z-index: 60; padding: 22px 24px 26px; max-height: 60vh; overflow-y: auto; }
  body.night #detail { background: rgba(20,19,26,0.98); border-top-color: rgba(255,255,255,0.1); }
  #detail.open { transform: translateY(0); }
  #detailInner { display: flex; gap: 18px; max-width: 640px; margin: 0 auto; }
  #detailCover { width: 92px; height: 134px; object-fit: cover; border-radius: 5px; background: #ddd; flex-shrink: 0; box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
  #detailText { flex: 1; min-width: 0; }
  #detailTitle { font-family: 'Fraunces', serif; font-size: 18px; color: #2b2a28; margin: 0 0 2px; }
  body.night #detailTitle { color: #f0ede4; }
  #detailAuthor { font-size: 13px; color: #7a766c; margin: 0 0 10px; }
  body.night #detailAuthor { color: #a89f8c; }
  #detailTags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 10.5px; padding: 3px 9px; border-radius: 999px; background: rgba(92,122,82,0.12); color: #5c7a52; }
  body.night .tag { background: rgba(201,168,106,0.15); color: #c9a86a; }
  #synLabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: #b0aa98; margin: 0 0 4px; }
  #detailDesc { font-size: 12.5px; line-height: 1.5; color: #55524a; margin: 0 0 12px; }
  body.night #detailDesc { color: #cfc9b8; }
  #detailISBN { font-size: 11px; color: #9a9688; margin-bottom: 12px; }
  #heartBtn { border: 1px solid rgba(0,0,0,0.12); background: none; border-radius: 999px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: #4a4842; display: inline-flex; align-items: center; gap: 6px; }
  body.night #heartBtn { border-color: rgba(255,255,255,0.15); color: #e6e1d3; }
  #heartBtn.saved { background: #d8555c; border-color: #d8555c; color: #fff; }
  #closeDetail { position: absolute; top: 16px; right: 18px; background: none; border: none; font-size: 20px; color: #9a9688; cursor: pointer; }

  #savedPanel { position: fixed; top: 0; right: 0; height: 100%; width: 320px; max-width: 90vw; background: rgba(255,255,255,0.98); border-left: 1px solid rgba(0,0,0,0.08); transform: translateX(100%); transition: transform 0.28s ease; z-index: 55; padding: 24px 20px; overflow-y: auto; }
  body.night #savedPanel { background: rgba(20,19,26,0.98); border-left-color: rgba(255,255,255,0.1); }
  #savedPanel.open { transform: translateX(0); }
  #savedPanel h2 { font-family: 'Fraunces', serif; font-size: 18px; color: #2b2a28; margin: 0 0 16px; }
  body.night #savedPanel h2 { color: #f0ede4; }
  .savedItem { display: flex; gap: 10px; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
  body.night .savedItem { border-bottom-color: rgba(255,255,255,0.06); }
  .savedItem img { width: 34px; height: 50px; object-fit: cover; border-radius: 3px; background: #ddd; }
  .savedItem span { font-size: 13px; color: #3a3833; }
  body.night .savedItem span { color: #d8d3c4; }
  #savedEmpty { font-size: 13px; color: #9a9688; }
  #closeSaved { position: absolute; top: 20px; right: 18px; background: none; border: none; font-size: 20px; color: #9a9688; cursor: pointer; }
</style>
</head>
<body>

<div id="hud">
  <div id="title">The Shelf<span>a walk-in catalog</span></div>
  <div id="topRight">
    <div class="pill" id="listToggle">☰ List</div>
    <div class="pill" id="randomBtn">🎲 Random</div>
    <div class="pill" id="dimToggle">🌙 <span id="dimLabel">Dim the lights</span></div>
    <div class="pill" id="savedToggle">♡ <span id="savedCount">0</span> saved</div>
    <div id="count"><b id="countNum">0</b> books</div>
  </div>
</div>

<div id="navArrows">
  <div class="navBtn" id="prevUnit">‹</div>
  <div class="navBtn" id="nextUnit">›</div>
</div>

<div id="hint">Hold ‹ › to walk · Drag to look · Tap a book</div>
<div id="errorBox"></div>
<div id="loadingLabel"></div>
<div id="loadingBar"><div id="loadingFill"></div></div>

<div id="detail">
  <button id="closeDetail">×</button>
  <div id="detailInner">
    <img id="detailCover" src="" alt="" />
    <div id="detailText">
      <h3 id="detailTitle"></h3>
      <p id="detailAuthor"></p>
      <div id="detailTags"></div>
      <p id="synLabel">Synopsis</p>
      <p id="detailDesc"></p>
      <div id="detailISBN"></div>
      <button id="heartBtn">♡ Save for later</button>
    </div>
  </div>
</div>

<div id="savedPanel">
  <button id="closeSaved">×</button>
  <h2>Saved for later</h2>
  <div id="savedList"></div>
</div>

<div id="listView">
  <div id="listHeader">
    <input type="text" id="searchInput" placeholder="Search title or author…" />
    <button id="closeList">×</button>
  </div>
  <div id="filterRow">
    <select id="genreSelect"><option value="">All genres</option></select>
    <select id="languageSelect"><option value="">All languages</option></select>
  </div>
  <div id="listGrid"></div>
  <div id="listDetail">
    <button id="closeListDetail">× Close</button>
    <div class="navBtn" id="prevBook">‹</div>
    <div class="navBtn" id="nextBook">›</div>
    <div id="listDetailBody">
      <div id="listDetailLeft"></div>
      <div id="listDetailRight">
        <h3 id="listDetailTitle"></h3>
        <p id="listDetailAuthor"></p>
        <div id="listDetailTags"></div>
        <p id="listSynLabel">Synopsis</p>
        <p id="listDetailDesc"></p>
        <div id="listDetailISBN"></div>
        <button id="listHeartBtn">♡ Save for later</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ---------- Palette ----------
const DAY = { bg: 0xdccbaa, fog: 0xdccbaa, fogDensity: 0.014, floor: 0xc9b183, wall: 0xe4d3af, shelf: 0xceb078, ambient: 0xfff2df, ambientI: 0.72, key: 0xffe4b0, keyI: 0.55, rim: 0xd8c39a, rimI: 0.2, shelfLight: 1.15 };
const NIGHT = { bg: 0x100e14, fog: 0x100e14, fogDensity: 0.03, floor: 0x181620, wall: 0x1c1926, shelf: 0x24202c, ambient: 0x201d2c, ambientI: 0.18, key: 0xffcf9e, keyI: 0.15, rim: 0x6a4fd6, rimI: 0.35, shelfLight: 1.6 };
let isNight = false;

// ---------- Layout ----------
const UNIT_ROWS = 5;
const PER_ROW = 30;
const PER_UNIT = UNIT_ROWS * PER_ROW;
const UNIT_WIDTH = 11;
const UNIT_GAP = 2.2;
const SHELF_GAP_Y = 1.55;
function unitCenterX(i) { return i * (UNIT_WIDTH + UNIT_GAP); }

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(DAY.bg);
scene.fog = new THREE.FogExp2(DAY.fog, DAY.fogDensity);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 300);
camera.position.set(0, 2.4, 9.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.52;
controls.target.set(0, 2, 0);
controls.enablePan = false;

const ambientLight = new THREE.AmbientLight(DAY.ambient, DAY.ambientI);
scene.add(ambientLight);
const key = new THREE.SpotLight(DAY.key, DAY.keyI, 30, Math.PI/4, 0.6, 1.2);
key.position.set(2, 10, 6);
key.target.position.set(0, 3, 0);
scene.add(key, key.target);
const rim = new THREE.PointLight(DAY.rim, DAY.rimI, 25);
rim.position.set(-6, 4, -4);
scene.add(rim);

const wallMat = new THREE.MeshStandardMaterial({ color: DAY.wall, roughness: 0.95 });
const wall = new THREE.Mesh(new THREE.PlaneGeometry(600, 20), wallMat);
wall.position.set(0, 8, -2.2);
scene.add(wall);

function makeTileTexture(dark) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = dark ? '#181620' : '#c9b183'; ctx.fillRect(0,0,512,512);
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.18)'; ctx.lineWidth = 4;
  const step = 512/6;
  for (let i=0; i<=6; i++){ ctx.beginPath(); ctx.moveTo(i*step,0); ctx.lineTo(i*step,512); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*step); ctx.lineTo(512,i*step); ctx.stroke(); }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(60,3);
  return tex;
}
const floorTexDay = makeTileTexture(false);
const floorTexNight = makeTileTexture(true);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTexDay, roughness: 0.9 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(600, 20), floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

function makePlant(x, z, scale=1) {
  const group = new THREE.Group();
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.16*scale, 0.13*scale, 0.22*scale, 12), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 }));
  pot.position.y = 0.11*scale; group.add(pot);
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x6f9a5c, roughness: 0.8 });
  for (let i=0;i<6;i++) {
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.05*scale, 0.32*scale, 5), leafMat);
    const ang = (i/6) * Math.PI * 2;
    leaf.position.set(Math.cos(ang)*0.06*scale, 0.32*scale, Math.sin(ang)*0.06*scale);
    leaf.rotation.z = Math.cos(ang) * 0.4; leaf.rotation.x = -Math.sin(ang) * 0.4;
    group.add(leaf);
  }
  group.position.set(x, 0, z); scene.add(group); return group;
}

const shelfGroup = new THREE.Group();
scene.add(shelfGroup);
const shelfMat = new THREE.MeshStandardMaterial({ color: DAY.shelf, roughness: 0.55 });
let shelfLights = [];
let shelfLightTargets = [];

function clearShelfLights() { shelfLights.forEach(l => scene.remove(l)); shelfLightTargets.forEach(t => scene.remove(t)); shelfLights = []; shelfLightTargets = []; }

function buildShelfUnit(unitIndex) {
  const cx = unitCenterX(unitIndex);
  for (let r = 0; r <= UNIT_ROWS; r++) {
    const board = new THREE.Mesh(new THREE.BoxGeometry(UNIT_WIDTH + 0.3, 0.08, 0.9), shelfMat);
    board.position.set(cx, 0.6 + r * SHELF_GAP_Y, 0);
    shelfGroup.add(board);
  }
  [-1, 1].forEach(sign => {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, UNIT_ROWS * SHELF_GAP_Y + 0.6, 0.9), shelfMat);
    post.position.set(cx + sign * (UNIT_WIDTH/2 + 0.15), 0.6 + (UNIT_ROWS * SHELF_GAP_Y)/2, 0);
    shelfGroup.add(post);
  });
  // one real spotlight above each shelf, aimed down at the books
  const lamp = new THREE.SpotLight(DAY.key, DAY.shelfLight, 12, Math.PI/3.2, 0.5, 1.4);
  lamp.position.set(cx, UNIT_ROWS * SHELF_GAP_Y + 1.6, 1.2);
  const lampTarget = new THREE.Object3D();
  lampTarget.position.set(cx, 0.6, 0.4);
  scene.add(lampTarget);
  lamp.target = lampTarget;
  scene.add(lamp);
  shelfLights.push(lamp);
  shelfLightTargets.push(lampTarget);
}

const textureLoader = new THREE.TextureLoader();
textureLoader.crossOrigin = 'anonymous';
const FALLBACK_TONES = [0xd8555c, 0x4a7a8c, 0xe0b84c, 0x6f9a5c, 0x8a6fa8, 0xd98f4c, 0x3f5c76, 0xc76b7a];

function fitFontSize(ctx, text, maxWidth, startSize, minSize, weight) {
  let size = startSize;
  while (size > minSize) {
    ctx.font = `${weight} ${size}px Georgia, serif`;
    if (ctx.measureText(text).width <= maxWidth) return size;
    size -= 2;
  }
  return minSize;
}

function makeSpineTexture(title, author, bgHex) {
  const W = 128, H = 512;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const hexStr = '#' + bgHex.toString(16).padStart(6, '0');
  ctx.fillStyle = hexStr;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.fillRect(0, 0, W, 12);
  ctx.fillRect(0, H - 12, W, 12);

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate(Math.PI / 2);
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxLineWidth = H - 70;
  ctx.font = '600 30px Georgia, serif';
  let titleLines, titleSize;

  if (ctx.measureText(title).width <= maxLineWidth) {
    titleSize = 30;
    titleLines = [title];
  } else {
    const shrunk = fitFontSize(ctx, title, maxLineWidth, 30, 15, '600');
    ctx.font = `600 ${shrunk}px Georgia, serif`;
    if (shrunk > 15 || ctx.measureText(title).width <= maxLineWidth) {
      titleSize = shrunk;
      titleLines = [title];
    } else {
      const words = title.split(' ');
      const mid = Math.ceil(words.length / 2);
      const line1 = words.slice(0, mid).join(' ');
      const line2 = words.slice(mid).join(' ') || '';
      const size1 = fitFontSize(ctx, line1, maxLineWidth, 24, 12, '600');
      const size2 = line2 ? fitFontSize(ctx, line2, maxLineWidth, 24, 12, '600') : 24;
      titleSize = Math.min(size1, size2);
      titleLines = line2 ? [line1, line2] : [line1];
    }
  }

  ctx.font = `600 ${titleSize}px Georgia, serif`;
  const lineGap = titleSize + 5;
  const titleBlockHeight = titleLines.length * lineGap;
  const authorGap = author ? 24 : 0;
  const blockStart = -(titleBlockHeight + authorGap) / 2 + lineGap / 2;
  titleLines.forEach((ln, i) => ctx.fillText(ln, 0, blockStart + i * lineGap));

  if (author) {
    let a = author;
    const aSize = fitFontSize(ctx, a, maxLineWidth, 19, 11, '400');
    ctx.font = `400 ${aSize}px Georgia, serif`;
    if (ctx.measureText(a).width > maxLineWidth) {
      while (a.length > 4 && ctx.measureText(a + '…').width > maxLineWidth) a = a.slice(0, -1);
      a = a + '…';
    }
    ctx.globalAlpha = 0.85;
    ctx.fillText(a, 0, blockStart + titleBlockHeight - lineGap / 2 + authorGap);
  }
  ctx.restore();
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function avgColorFromImage(img) {
  const c = document.createElement('canvas'); c.width = 8; c.height = 8;
  const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 8, 8);
  const data = ctx.getImageData(0,0,8,8).data;
  let r=0,g=0,b=0,n=0;
  for (let i=0;i<data.length;i+=4){ r+=data[i]; g+=data[i+1]; b+=data[i+2]; n++; }
  return new THREE.Color(r/n/255, g/n/255, b/n/255);
}

let allBooks = [];
function bookKey(b) { return (b.title + '|' + (b.author||'')).toLowerCase().trim(); }

function makeBookMesh(book, index) {
  const unit = Math.floor(index / PER_UNIT);
  const localIdx = index % PER_UNIT;
  const row = Math.floor(localIdx / PER_ROW);
  const displayRow = UNIT_ROWS - 1 - row;
  const col = localIdx % PER_ROW;
  const spacing = (UNIT_WIDTH - 0.7) / PER_ROW;

  const w = spacing * 0.82;
  const h = 1.25 + (index % 2) * 0.1;
  const d = 0.85;

  const fallbackHex = FALLBACK_TONES[index % FALLBACK_TONES.length];
  const fallback = new THREE.Color(fallbackHex);
  const plainMat = new THREE.MeshStandardMaterial({ color: fallback, roughness: 0.6 });
  const spineTex = makeSpineTexture(book.title, book.author || '', fallbackHex);
  const spineMat = new THREE.MeshStandardMaterial({ map: spineTex, roughness: 0.6 });
  const mats = [spineMat.clone(), plainMat.clone(), plainMat.clone(), plainMat.clone(), spineMat.clone(), plainMat.clone()];
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mats);

  const cx = unitCenterX(unit);
  const x = cx - UNIT_WIDTH/2 + 0.35 + col * spacing;
  const y = 0.6 + displayRow * SHELF_GAP_Y + h/2 + 0.06;
  mesh.position.set(x, y, 0);
  mesh.userData.basePos = mesh.position.clone();
  mesh.userData.baseRotY = 0;
  mesh.userData.baseScale = 1;
  mesh.userData.book = book;
  book._mesh = mesh;
  book._unit = unit;
  shelfGroup.add(mesh);

  if (book.cover) {
    textureLoader.load(book.cover, (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      const coverMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5 });
      mesh.material[0] = coverMat;
      mesh.material.needsUpdate = true;
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const col2 = avgColorFromImage(img);
        [1,2,3,5].forEach(i => { mesh.material[i] = new THREE.MeshStandardMaterial({ color: col2, roughness: 0.6 }); });
        mesh.material.needsUpdate = true;
      };
      img.src = book.cover;
    });
  }
  return mesh;
}

function makeBookStackDecor(scale=1) {
  const group = new THREE.Group();
  const tones = [0xc76b7a, 0x4a7a8c, 0xe0b84c, 0x6f9a5c];
  let y = 0;
  for (let i = 0; i < 3; i++) {
    const w = (0.5 - i*0.03) * scale;
    const h = 0.09 * scale;
    const d = (0.36 - i*0.02) * scale;
    const mat = new THREE.MeshStandardMaterial({ color: tones[i % tones.length], roughness: 0.7 });
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set((Math.random()-0.5)*0.03*scale, y + h/2, (Math.random()-0.5)*0.03*scale);
    m.rotation.y = (Math.random()-0.5) * 0.12;
    group.add(m);
    y += h;
  }
  return group;
}

function makeOwlDecor(scale=1) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8a6f4e, roughness: 0.8 });
  const bellyMat = new THREE.MeshStandardMaterial({ color: 0xd9c9a3, roughness: 0.8 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.14*scale, 12, 10), bodyMat);
  body.scale.set(1, 1.3, 0.85);
  body.position.y = 0.16*scale;
  group.add(body);
  const belly = new THREE.Mesh(new THREE.SphereGeometry(0.09*scale, 10, 8), bellyMat);
  belly.scale.set(1, 1.2, 0.6);
  belly.position.set(0, 0.14*scale, 0.09*scale);
  group.add(belly);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2a2418, roughness: 0.5 });
  [-1,1].forEach(s => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.028*scale, 8, 8), eyeMat);
    eye.position.set(s*0.05*scale, 0.22*scale, 0.1*scale);
    group.add(eye);
  });
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.025*scale, 0.05*scale, 6), new THREE.MeshStandardMaterial({color:0xd9992e}));
  beak.position.set(0, 0.19*scale, 0.13*scale);
  beak.rotation.x = Math.PI/2;
  group.add(beak);
  return group;
}

function makeVaseDecor(scale=1) {
  const group = new THREE.Group();
  const potMat = new THREE.MeshStandardMaterial({ color: 0xe8e2d4, roughness: 0.6 });
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.09*scale, 0.06*scale, 0.2*scale, 12), potMat);
  pot.position.y = 0.1*scale;
  group.add(pot);
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x5c8a4f, roughness: 0.8 });
  for (let i=0;i<5;i++) {
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.035*scale, 0.24*scale, 5), leafMat);
    const ang = (i/5) * Math.PI * 2;
    leaf.position.set(Math.cos(ang)*0.04*scale, 0.24*scale, Math.sin(ang)*0.04*scale);
    leaf.rotation.z = Math.cos(ang) * 0.35;
    leaf.rotation.x = -Math.sin(ang) * 0.35;
    group.add(leaf);
  }
  return group;
}

function makeLanternDecor(scale=1) {
  const group = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x3a2f22, roughness: 0.6, metalness: 0.3 });
  const glassMat = new THREE.MeshStandardMaterial({ color: 0xf0c674, emissive: 0xf0c674, emissiveIntensity: 0.4, roughness: 0.4 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.14*scale, 0.22*scale, 0.14*scale), glassMat);
  body.position.y = 0.16*scale;
  group.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(0.11*scale, 0.08*scale, 4), frameMat);
  roof.position.y = 0.31*scale;

  group.add(roof);
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.16*scale, 0.03*scale, 0.16*scale), frameMat);
  base.position.y = 0.03*scale;
  group.add(base);
  const handle = new THREE.Mesh(new THREE.TorusGeometry(0.05*scale, 0.008*scale, 6, 10, Math.PI), frameMat);

  handle.rotation.x = Math.PI/2;
  group.add(handle);
  return group;
}

function makeCatDecor(scale=1) {
  const group = new THREE.Group();
  const furMat = new THREE.MeshStandardMaterial({ color: 0x4a4038, roughness: 0.8 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.11*scale, 12, 10), furMat);
  body.scale.set(1, 1.15, 1.4);
  body.position.set(0, 0.12*scale, 0);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.08*scale, 12, 10), furMat);
  head.position.set(0, 0.24*scale, 0.09*scale);
  group.add(head);
  [-1,1].forEach(s => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.03*scale, 0.05*scale, 6), furMat);

  group.add(tail);
  return group;
}

function wrapLines(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = []; let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  return lines;
}

function makeFrameTexture(isPoem, photoDataUri) {

  ctx.restore();
  const pad = 30;

    let y = 110;

      if (p === '') { y += 30; return; }
      const wrapped = wrapLines(ctx, p, W - pad*2 - 30);
      wrapped.forEach(line => { ctx.fillText(line, W/2, y); y += 40; });

      const sw = innerW / scale, sh = innerH / scale;
      const sx = (img.width - sw) / 2, sy = (img.height - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, pad, pad, innerW, innerH);
      tex.needsUpdate = true;
    };
    img.src = photoDataUri;
    return tex;
  }

  ctx.fillStyle = '#a89a7c';
  ctx.font = '46px Georgia';
  ctx.fillText('📷', W/2, H/2 - 6);
  ctx.font = '15px Georgia';
  ctx.fillText('photo coming soon', W/2, H/2 + 32);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function placePictureFrame(books) {
  let anchorIndex = books.findIndex(b => /princes/i.test(b.title));
  if (anchorIndex === -1) anchorIndex = PER_ROW;
  const unit = Math.floor(anchorIndex / PER_UNIT);
  const localIdx = anchorIndex % PER_UNIT;
  const row = Math.floor(localIdx / PER_ROW);
  const displayRow = UNIT_ROWS - 1 - row;
  const col = localIdx % PER_ROW;
  const spacing = (UNIT_WIDTH - 0.7) / PER_ROW;
  const cx = unitCenterX(unit);

  const w = spacing * 0.95, h = 0.95, d = 0.045;
  const geo = new THREE.BoxGeometry(w, h, d);
  const sideMat = new THREE.MeshStandardMaterial({ color: 0xc81d4f, roughness: 0.6 });
  const frontMat = new THREE.MeshStandardMaterial({ map: makeFrameTexture(false, COUPLE_PHOTO_URI), roughness: 0.6 });
  const backMat = new THREE.MeshStandardMaterial({ map: makeFrameTexture(true), roughness: 0.6 });
  const mats = [sideMat, sideMat, sideMat, sideMat, frontMat, backMat];
  const mesh = new THREE.Mesh(geo, mats);

  const x = cx - UNIT_WIDTH/2 + 0.35 + (col + 1) * spacing;
  const y = 0.6 + displayRow * SHELF_GAP_Y + h/2 + 0.06;
  mesh.position.set(x, y, 0);
  mesh.userData.basePos = mesh.position.clone();
  mesh.userData.baseRotY = 0;
  mesh.userData.baseScale = 1;
  mesh.userData.frame = true;
  shelfGroup.add(mesh);
  pictureFrameMesh = mesh;
}

let frameState = 'shelf'; // 'shelf' | 'photo' | 'poem'
function handleFrameTap() {
  if (currentInspect) returnBook(currentInspect);
  const mesh = pictureFrameMesh;
  if (frameState === 'shelf') {
    const inspectPos = new THREE.Vector3(camera.position.x, 2.15, 5.2);
    startTween(mesh, inspectPos, mesh.userData.baseRotY, 1.9, 700);
    frameState = 'photo';
  } else if (frameState === 'photo') {
    startTween(mesh, mesh.position.clone(), mesh.userData.baseRotY + Math.PI, 1.9, 500);
    frameState = 'poem';
  } else {
    startTween(mesh, mesh.userData.basePos, mesh.userData.baseRotY, mesh.userData.baseScale, 550);
    frameState = 'shelf';
  }
}

const DECOR_MAKERS = [makeBookStackDecor, makeOwlDecor, makeVaseDecor, makeLanternDecor, makeCatDecor];
let decorGroup = new THREE.Group();
scene.add(decorGroup);
function clearDecor() { while (decorGroup.children.length) decorGroup.remove(decorGroup.children[0]); }

function scatterDecor(totalUnits, rowBookCounts) {
  clearDecor();
  // one item on top of each bookcase
  for (let u = 0; u < totalUnits; u++) {
    const maker = DECOR_MAKERS[u % DECOR_MAKERS.length];
    const item = maker(1.1);
    const cx = unitCenterX(u);
    item.position.set(cx + UNIT_WIDTH/2 - 0.7, UNIT_ROWS * SHELF_GAP_Y + 0.64, 0.15);
    item.rotation.y = (Math.random() - 0.5) * 0.4;
    decorGroup.add(item);
  }
  // fill leftover space at the end of any partially-filled row (mainly the last unit)
  rowBookCounts.forEach(({ unit, row, count }) => {
    const leftover = PER_ROW - count;
    if (leftover < 2) return;
    const spacing = (UNIT_WIDTH - 0.7) / PER_ROW;
    const cx = unitCenterX(unit);
    const startX = cx - UNIT_WIDTH/2 + 0.35 + count * spacing;
    const displayRow = UNIT_ROWS - 1 - row;
    const y = 0.64 + displayRow * SHELF_GAP_Y;
    const maker = DECOR_MAKERS[(unit + row) % DECOR_MAKERS.length];
    const item = maker(0.9);
    item.position.set(startX + Math.min(leftover, 3) * spacing / 2, y, 0.1);
    item.rotation.y = (Math.random() - 0.5) * 0.5;
    decorGroup.add(item);
  });
}

function buildShelfFromBooks(books) {
  allBooks = books;
  while (shelfGroup.children.length) shelfGroup.remove(shelfGroup.children[0]);
  clearShelfLights();
  const totalUnits = Math.max(1, Math.ceil(books.length / PER_UNIT));
  for (let u = 0; u < totalUnits; u++) buildShelfUnit(u);
  books.forEach((book, i) => makeBookMesh(book, i));
  placePictureFrame(books);
  document.getElementById('countNum').textContent = books.length;
  window._totalUnits = totalUnits;

  const rowCounts = new Map();
  books.forEach((book, i) => {
    const unit = Math.floor(i / PER_UNIT);
    const row = Math.floor((i % PER_UNIT) / PER_ROW);
    const key = unit + '_' + row;
    rowCounts.set(key, (rowCounts.get(key) || 0) + 1);
  });
  const rowBookCounts = [...rowCounts.entries()].map(([key, count]) => {
    const [unit, row] = key.split('_').map(Number);
    return { unit, row, count };
  });
  scatterDecor(totalUnits, rowBookCounts);
}

makePlant(-UNIT_WIDTH/2 - 1.4, 1.6, 1.3);

// ---------- Free walking movement ----------
let moveDir = 0;
const WALK_SPEED = 0.09;
function bindHold(el, dir) {
  const start = (e) => { e.preventDefault(); moveDir = dir; };
  const stop = () => { moveDir = 0; };
  el.addEventListener('pointerdown', start);
  el.addEventListener('pointerup', stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('pointercancel', stop);
}
bindHold(document.getElementById('prevUnit'), -1);
bindHold(document.getElementById('nextUnit'), 1);

function clampWalk() {
  const total = window._totalUnits || 1;
  const minX = unitCenterX(0) - 3;
  const maxX = unitCenterX(total - 1) + 3;
  camera.position.x = Math.max(minX, Math.min(maxX, camera.position.x));
  controls.target.x = Math.max(minX, Math.min(maxX, controls.target.x));
}

// ---------- Day/Night toggle ----------
function lerpColor(hexA, hexB, t) { return new THREE.Color(hexA).clone().lerp(new THREE.Color(hexB), t); }
function applyMode(night) {
  const from = night ? DAY : NIGHT; const to = night ? NIGHT : DAY;
  const duration = 700; const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    scene.background = lerpColor(from.bg, to.bg, t);
    scene.fog.color = lerpColor(from.fog, to.fog, t);
    scene.fog.density = from.fogDensity + (to.fogDensity - from.fogDensity) * t;
    ambientLight.color = lerpColor(from.ambient, to.ambient, t);
    ambientLight.intensity = from.ambientI + (to.ambientI - from.ambientI) * t;
    key.color = lerpColor(from.key, to.key, t);
    key.intensity = from.keyI + (to.keyI - from.keyI) * t;
    rim.color = lerpColor(from.rim, to.rim, t);
    rim.intensity = from.rimI + (to.rimI - from.rimI) * t;
    wallMat.color = lerpColor(from.wall, to.wall, t);
    shelfMat.color = lerpColor(from.shelf, to.shelf, t);
    const lampI = from.shelfLight + (to.shelfLight - from.shelfLight) * t;
    const lampColor = lerpColor(from.key, to.key, t);
    shelfLights.forEach(l => { l.intensity = lampI; l.color = lampColor; });
    floorMat.map = t > 0.5 ? (night ? floorTexNight : floorTexDay) : floorMat.map;
    floorMat.needsUpdate = true;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  document.body.classList.toggle('night', night);
  document.getElementById('dimLabel').textContent = night ? 'Brighten up' : 'Dim the lights';
  document.getElementById('dimToggle').firstChild.textContent = night ? '☀️ ' : '🌙 ';
}
document.getElementById('dimToggle').onclick = () => { isNight = !isNight; applyMode(isNight); };

// ---------- Tween manager ----------
const activeTweens = new Set();
function startTween(mesh, toPos, toRotY, toScale, duration=650) {
  mesh.userData.tween = {
    fromPos: mesh.position.clone(), toPos: toPos.clone(),
    fromRotY: mesh.rotation.y, toRotY: toRotY,
    fromScale: mesh.scale.x, toScale: toScale,
    t0: performance.now(), duration
  };
  activeTweens.add(mesh);
}
function updateTweens(now) {
  activeTweens.forEach(mesh => {
    const tw = mesh.userData.tween;
    if (!tw) { activeTweens.delete(mesh); return; }
    const t = Math.min(1, (now - tw.t0) / tw.duration);
    const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    mesh.position.lerpVectors(tw.fromPos, tw.toPos, e);
    mesh.rotation.y = tw.fromRotY + (tw.toRotY - tw.fromRotY) * e;
    const s = tw.fromScale + (tw.toScale - tw.fromScale) * e;
    mesh.scale.set(s, s, s);
    if (t >= 1) { activeTweens.delete(mesh); mesh.userData.tween = null; }
  });
}

// ---------- Inspect (pull book out) ----------
let currentInspect = null;

function selectBook(mesh) {
  if (currentInspect === mesh) { returnBook(mesh); return; }
  if (currentInspect) returnBook(currentInspect);
  if (frameState !== 'shelf') { startTween(pictureFrameMesh, pictureFrameMesh.userData.basePos, pictureFrameMesh.userData.baseRotY, pictureFrameMesh.userData.baseScale, 550); frameState = 'shelf'; }
  currentInspect = mesh;
  const inspectPos = new THREE.Vector3(camera.position.x, 2.15, 5.2);
  startTween(mesh, inspectPos, -Math.PI/2, 1.9, 700);
  openDetail(mesh.userData.book);
}
function returnBook(mesh) {
  startTween(mesh, mesh.userData.basePos, mesh.userData.baseRotY, mesh.userData.baseScale, 550);
  if (currentInspect === mesh) currentInspect = null;
  document.getElementById('detail').classList.remove('open');
}

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downPos = null;
renderer.domElement.addEventListener('pointerdown', (e) => { downPos = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('pointerup', (e) => {
  if (!downPos) return;
  const dist = Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y);
  downPos = null;
  if (dist > 6) return;
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(shelfGroup.children, false).filter(h => h.object.userData.book || h.object.userData.frame);
  if (hits.length) {
    const obj = hits[0].object;
    if (obj.userData.frame) handleFrameTap();
    else selectBook(obj);
  }
});

// ---------- Saved books ----------
const SAVED_KEY = 'theshelf_saved_v1';
function loadSaved() { try { return JSON.parse(localStorage.getItem(SAVED_KEY)) || {}; } catch(e){ return {}; } }
function persistSaved(obj) { try { localStorage.setItem(SAVED_KEY, JSON.stringify(obj)); } catch(e){} }
let saved = loadSaved();
function updateSavedCount() { document.getElementById('savedCount').textContent = Object.keys(saved).length; }
updateSavedCount();

function renderSavedList() {
  const list = document.getElementById('savedList');
  const keys = Object.keys(saved);
  if (!keys.length) { list.innerHTML = '<div id="savedEmpty">Tap the heart on any book to save it here.</div>'; return; }
  list.innerHTML = '';
  keys.forEach(k => {
    const b = saved[k];
    const row = document.createElement('div');
    row.className = 'savedItem';
    row.innerHTML = `<img src="${b.cover || ''}" /><span>${b.title}${b.author ? ' — ' + b.author : ''}</span>`;
    row.onclick = () => openDetail(b);
    list.appendChild(row);
  });
}
document.getElementById('savedToggle').onclick = () => { renderSavedList(); document.getElementById('savedPanel').classList.add('open'); };
document.getElementById('closeSaved').onclick = () => document.getElementById('savedPanel').classList.remove('open');

// ---------- Jump to a specific book (used by search, list, random) ----------
function jumpToBook(book) {
  if (!book._mesh) return;
  const cx = unitCenterX(book._unit);
  camera.position.set(cx, camera.position.y, camera.position.z);
  controls.target.set(cx, controls.target.y, 0);
  selectBook(book._mesh);
}

// ---------- List / search / filter view ----------
function populateFilterDropdowns() {
  const genreCounts = new Map(); const languageCounts = new Map();
  allBooks.forEach(b => {
    (b.genre || []).forEach(g => genreCounts.set(g, (genreCounts.get(g) || 0) + 1));
    if (b.language) languageCounts.set(b.language, (languageCounts.get(b.language) || 0) + 1);
  });
  const gSel = document.getElementById('genreSelect');
  const lSel = document.getElementById('languageSelect');
  const gVal = gSel.value; const lVal = lSel.value;
  gSel.innerHTML = '<option value="">All genres</option>';
  [...genreCounts.keys()].sort().forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = `${g} (${genreCounts.get(g)})`; gSel.appendChild(o); });
  lSel.innerHTML = '<option value="">All languages</option>';
  [...languageCounts.keys()].sort().forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = `${l} (${languageCounts.get(l)})`; lSel.appendChild(o); });
  gSel.value = gVal; lSel.value = lVal;
}

function filteredBooks() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const genre = document.getElementById('genreSelect').value;
  const language = document.getElementById('languageSelect').value;
  return allBooks.filter(b => {
    if (q && !(b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q))) return false;
    if (genre && !(b.genre || []).includes(genre)) return false;
    if (language && b.language !== language) return false;
    return true;
  });
}

function renderList() {
  populateFilterDropdowns();
  const grid = document.getElementById('listGrid');
  const list = filteredBooks();
  currentListArray = list;
  grid.innerHTML = '';
  if (!list.length) { grid.innerHTML = '<div id="noResults">No books match.</div>'; return; }
  list.forEach((b, idx) => {
    const card = document.createElement('div');
    card.className = 'gridCard';
    const tone = '#' + FALLBACK_TONES[Math.abs(hashStr(b.title)) % FALLBACK_TONES.length].toString(16).padStart(6,'0');
    card.innerHTML = `<div class="gridSpine" style="background:${b.cover ? 'transparent' : tone}">${b.cover ? `<img src="${b.cover}"/>` : `<span>${b.title.length>60?b.title.slice(0,58)+'…':b.title}</span>`}</div><p>${b.title}${b.author ? '<br>'+b.author : ''}</p>`;
    card.onclick = () => { currentListIndex = idx; openListDetail(b); };
    grid.appendChild(card);
  });
}
function hashStr(s) { let h=0; for (let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return h; }

document.getElementById('listToggle').onclick = () => { renderList(); document.getElementById('listView').classList.add('open'); };
document.getElementById('closeList').onclick = () => document.getElementById('listView').classList.remove('open');
document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('genreSelect').addEventListener('change', renderList);
document.getElementById('languageSelect').addEventListener('change', renderList);

// ---------- Split-view book detail (from list) ----------
let currentListBook = null;
let currentListArray = [];
let currentListIndex = -1;

function openListDetail(book) {
  currentListBook = book;
  const left = document.getElementById('listDetailLeft');
  const tone = FALLBACK_TONES[Math.abs(hashStr(book.title)) % FALLBACK_TONES.length];
  const toneStr = '#' + tone.toString(16).padStart(6,'0');
  left.innerHTML = book.cover
    ? `<img src="${book.cover}" />`
    : `<div class="listDetailSpine" style="background:${toneStr}"><span>${book.title}</span></div>`;

  document.getElementById('listDetailTitle').textContent = book.title;
  document.getElementById('listDetailAuthor').textContent = book.author || '';
  const tags = document.getElementById('listDetailTags');
  tags.innerHTML = '';
  (book.genre || []).forEach(g => { const t = document.createElement('span'); t.className = 'tag'; t.textContent = g; tags.appendChild(t); });
  if (book.language) { const t = document.createElement('span'); t.className = 'tag'; t.textContent = book.language; tags.appendChild(t); }
  document.getElementById('listDetailDesc').textContent = book.description || 'Loading synopsis…';
  document.getElementById('listDetailISBN').textContent = book.isbn ? ('ISBN ' + book.isbn) : '';

  const key = bookKey(book);
  const heartBtn = document.getElementById('listHeartBtn');
  const isSaved = !!saved[key];
  heartBtn.textContent = isSaved ? '♥ Saved' : '♡ Save for later';
  heartBtn.classList.toggle('saved', isSaved);

  document.getElementById('listDetail').classList.add('open');
  loadSynopsisFor(book, (text) => {
    if (currentListBook === book) document.getElementById('listDetailDesc').textContent = text || 'No synopsis added yet.';
  });
}
document.getElementById('closeListDetail').onclick = () => {
  document.getElementById('listDetail').classList.remove('open');
  currentListBook = null;
};
document.getElementById('prevBook').onclick = () => {
  if (!currentListArray.length) return;
  currentListIndex = (currentListIndex - 1 + currentListArray.length) % currentListArray.length;
  openListDetail(currentListArray[currentListIndex]);
};
document.getElementById('nextBook').onclick = () => {
  if (!currentListArray.length) return;
  currentListIndex = (currentListIndex + 1) % currentListArray.length;
  openListDetail(currentListArray[currentListIndex]);
};
document.getElementById('listHeartBtn').onclick = () => {
  if (!currentListBook) return;
  const key = bookKey(currentListBook);
  const heartBtn = document.getElementById('listHeartBtn');
  if (saved[key]) { delete saved[key]; heartBtn.textContent = '♡ Save for later'; heartBtn.classList.remove('saved'); }
  else { saved[key] = currentListBook; heartBtn.textContent = '♥ Saved'; heartBtn.classList.add('saved'); }
  persistSaved(saved);
  updateSavedCount();
};

// ---------- Random book ----------
document.getElementById('randomBtn').onclick = () => {
  if (!allBooks.length) return;
  const pick = allBooks[Math.floor(Math.random() * allBooks.length)];
  document.getElementById('listView').classList.remove('open');
  jumpToBook(pick);
};

// ---------- Keyboard controls ----------
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') moveDir = -1;
  if (e.key === 'ArrowRight') moveDir = 1;
  if (e.key === 'Escape') {
    if (document.getElementById('listDetail').classList.contains('open')) document.getElementById('listDetail').classList.remove('open');
    else if (document.getElementById('listView').classList.contains('open')) document.getElementById('listView').classList.remove('open');
    else if (currentInspect) returnBook(currentInspect);
  }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') moveDir = 0;
});

// ---------- Detail panel ----------
let currentDetailBook = null;
function openDetail(book) {
  currentDetailBook = book;
  document.getElementById('detailCover').src = book.cover || '';
  document.getElementById('detailTitle').textContent = book.title;
  document.getElementById('detailAuthor').textContent = book.author || '';
  const tags = document.getElementById('detailTags');
  tags.innerHTML = '';
  (book.genre || []).forEach(g => { const t = document.createElement('span'); t.className='tag'; t.textContent = g; tags.appendChild(t); });
  if (book.language) { const t = document.createElement('span'); t.className='tag'; t.textContent = book.language; tags.appendChild(t); }
  document.getElementById('detailDesc').textContent = book.description || 'Loading synopsis…';
  document.getElementById('detailISBN').textContent = book.isbn ? ('ISBN ' + book.isbn) : '';
  const key = bookKey(book);
  const heartBtn = document.getElementById('heartBtn');
  const isSaved = !!saved[key];
  heartBtn.textContent = isSaved ? '♥ Saved' : '♡ Save for later';
  heartBtn.classList.toggle('saved', isSaved);
  document.getElementById('detail').classList.add('open');
  loadSynopsisFor(book);
}

const synopsisCache = (() => { try { return JSON.parse(localStorage.getItem('theshelf_synopsis_v1')) || {}; } catch(e) { return {}; } })();
function persistSynopsisCache() { try { localStorage.setItem('theshelf_synopsis_v1', JSON.stringify(synopsisCache)); } catch(e) {} }

async function loadSynopsisFor(book, onDone) {
  if (book.synopsisLoaded || !book.pageId) { if (onDone) onDone(book.description); return; }
  if (synopsisCache[book.pageId]) {
    book.description = synopsisCache[book.pageId];
    book.synopsisLoaded = true;
    if (currentDetailBook === book) document.getElementById('detailDesc').textContent = book.description || 'No synopsis added yet.';
    if (onDone) onDone(book.description);
    return;
  }
  try {
    const res = await fetch('/api/book-detail?id=' + encodeURIComponent(book.pageId));
    const data = await res.json();
    const text = (res.ok && data.synopsis) ? data.synopsis : '';
    book.description = text;
    book.synopsisLoaded = true;
    synopsisCache[book.pageId] = text;
    persistSynopsisCache();
    if (currentDetailBook === book) {
      document.getElementById('detailDesc').textContent = text || 'No synopsis added yet.';
    }
    if (onDone) onDone(text);
  } catch (e) {
    if (currentDetailBook === book) document.getElementById('detailDesc').textContent = 'Could not load synopsis.';
    if (onDone) onDone('');
  }
}
document.getElementById('closeDetail').onclick = () => { if (currentInspect) returnBook(currentInspect); else document.getElementById('detail').classList.remove('open'); };
document.getElementById('heartBtn').onclick = () => {
  if (!currentDetailBook) return;
  const key = bookKey(currentDetailBook);
  const heartBtn = document.getElementById('heartBtn');
  if (saved[key]) { delete saved[key]; heartBtn.textContent = '♡ Save for later'; heartBtn.classList.remove('saved'); }
  else { saved[key] = currentDetailBook; heartBtn.textContent = '♥ Saved'; heartBtn.classList.add('saved'); }
  persistSaved(saved);
  updateSavedCount();
};

// ---------- Animation loop ----------
function animate(now) {
  requestAnimationFrame(animate);
  if (moveDir !== 0) { camera.position.x += moveDir * WALK_SPEED; controls.target.x += moveDir * WALK_SPEED; clampWalk(); }
  updateTweens(now || performance.now());
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Notion sync ----------
function showError(msg) { const box = document.getElementById('errorBox'); box.textContent = msg; box.style.display = 'block'; }

async function loadLibrary() {
  document.getElementById('loadingLabel').textContent = 'Fetching your catalog from Notion…';
  let notionBooks = [];
  try {
    const res = await fetch('/api/books');
    const data = await res.json();
    if (!res.ok) { showError('Could not load from Notion: ' + (data.error?.message || JSON.stringify(data.error) || 'unknown error')); return; }
    notionBooks = data.books || [];
  } catch (e) { showError('Could not reach /api/books. Is this running on Vercel with the environment variables set?'); return; }

  document.getElementById('countNum').textContent = notionBooks.length;
  document.getElementById('loadingLabel').textContent = '';

  const enriched = notionBooks.map(b => ({
    title: b.title, author: b.author, genre: b.genre, language: b.language,
    isbn: b.notionISBN || '', cover: b.notionCover || null,
    description: '', pageId: b.notionPageId, synopsisLoaded: false
  }));

  enriched.sort((a, b) => {
    const authorCmp = (a.author || '').toLowerCase().localeCompare((b.author || '').toLowerCase());
    if (authorCmp !== 0) return authorCmp;
    return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
  });

  buildShelfFromBooks(enriched);
  const startX = unitCenterX(0) - UNIT_WIDTH/2 + 2.2;
  camera.position.set(startX, 2.4, 9.5);
  controls.target.set(startX, 2, 0);
}

loadLibrary();
